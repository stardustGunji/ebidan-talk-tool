<!DOCTYPE html>

<html lang="ja">
<head>
<meta charset="UTF-8">
<title>座談会 → 吹き出しHTML 自動生成ツール</title>

<style>
body{
font-family:sans-serif;
margin:40px;
}

textarea{
width:100%;
height:180px;
margin-bottom:20px;
font-size:14px;
padding:10px;
}

button{
padding:10px 20px;
font-size:14px;
cursor:pointer;
margin-right:10px;
margin-bottom:20px;
}

pre{
background:#f5f5f5;
padding:20px;
border:1px solid #ddd;
white-space:pre-wrap;
}

#preview{
border:1px solid #ddd;
padding:20px;
margin-top:10px;
background:#fafafa;
}

.balloon_l,.balloon_r{
margin:30px 0;
display:flex;
align-items:flex-start
}

.balloon_r{
flex-direction:row-reverse
}

.faceicon{
display:flex;
flex-direction:column;
align-items:center;
margin:0 15px
}

.faceicon img{
width:70px;
height:70px;
border-radius:50%;
object-fit:cover
}

.name{
font-size:12px;
color:#555;
margin-top:5px
}

.says{
max-width:480px;
background:#e8f5e9;
padding:14px 16px;
border-radius:12px;
line-height:1.5
}

.balloon_r .says{
background:#eceff1
}

.member-profile{
display:inline-block;
margin:10px;
text-align:center
}

.member-profile img{
width:70px;
height:70px;
border-radius:50%;
object-fit:cover
}

.member-profile .team{
font-size:12px;
color:#777
}

.member-profile .name{
font-weight:bold
}
</style>

</head>

<body>

<h2>① 参加メンバー（名前だけ入力）</h2>
<textarea id="members"></textarea>

<h2>② 座談会テキスト</h2>
<p>形式： 名前：発言</p>
<textarea id="input"></textarea>

<button onclick="convert()">HTML生成</button> <button onclick="copyHTML()">HTMLコピー</button>

<h3>生成HTML</h3>
<pre id="output"></pre>

<h3>プレビュー</h3>
<div id="preview"></div>

<script>

let MEMBER_DB = {};

async function loadMembers(){
 const res = await fetch("./members.json");
 MEMBER_DB = await res.json();
}

loadMembers();

const STAFF_IMG =
"https://ebidan.com/s3/skiyaki/uploads/ckeditor/pictures/761972/content_ne.png";


function findMember(name){

  const clean = normalize(name);

  // 特例
  if(clean === "staff"){
    return {
      img: STAFF_IMG,
      team:"STAFF"
    };
  }

  if(clean === normalize("一同")){
    return {
      img: STAFF_IMG,
      team:"ALL"
    };
  }

  for(const key in MEMBER_DB){
    if(normalize(key) === clean){
      return MEMBER_DB[key];
    }
  }

  return null;
}

function convert(){

 const errors = [];

 const memberLines =
 document.getElementById("members").value.split(/\r?\n/);

 let html = `<h3>今回の参加メンバー</h3><div>`;

 memberLines.forEach(line=>{

  const name = line.trim();
  if(!name) return;

  const clean = name.replace(/\s/g,"");
  const upper = clean.toUpperCase();

  if(upper === "STAFF" || clean === "一同") return;

  const data = findMember(name);

  if(!data){
    errors.push("参加メンバーに存在しません: " + name);
    return;
  }

  html += `
<div class="member-profile">
<img src="${data.img}">
<div class="team">${data.team}</div>
<div class="name">${name}</div>
</div>`;

 });

 html += `</div><section class="conversation-log">`;

 const lines =
 document.getElementById("input").value.split(/\r?\n/);

 lines.forEach(line=>{

  if(!line.trim()) return;

  const parts = line.split(/[:：]/);

  if(parts.length < 2){
    errors.push("発言形式エラー: " + line);
    return;
  }

  const name = parts[0].trim();
  const speech = parts.slice(1).join("：").trim();
const clean = name.replace(/\s/g,"");
const upper = clean.toUpperCase();

const data = findMember(name);

const isStaff = upper === "STAFF";
const isAll   = clean === "一同";

if(!data && !isStaff && !isAll){
  errors.push("メンバーDBに存在しません: " + name);
  return;
}

  let side = "l";

  if(name.replace(/\s/g,"").toUpperCase() === "STAFF"){
    side = "r";
  }

  html += `
<div class="balloon_${side}">
<div class="faceicon">
<img src="${data.img}">
<span class="name">${name}</span>
</div>
<div class="says"><p>${speech}</p></div>
</div>`;

 });

 html += `</section>`;

 if(errors.length > 0){
   alert(errors.join("\n"));
 }

 document.getElementById("output").textContent = html;

 document.getElementById("preview").innerHTML = html;

}


function copyHTML(){

 const text =
 document.getElementById("output").textContent;

 navigator.clipboard.writeText(text);

 alert("HTMLをコピーしました");

}
 
function normalize(str){
  return str
    .replace(/\s/g,"")              // スペース削除
    .toLowerCase()
    .replace(/[ァ-ン]/g, s =>       // カタカナ→ひらがな
      String.fromCharCode(s.charCodeAt(0) - 0x60)
    );
}
</script>

<div>
<p>
 
<style type="text/css">/* 共通の吹き出しスタイル */
            .balloon_l, .balloon_r {

            }

            /* 顔アイコンと名前のコンテナ */
            .faceicon {
                display: flex;

            }
            .balloon_r .says:after {
                right: -26px;
                border-left: 22px solid #E0E0E0; /* 薄めのグレー */
            }
    
            /* --- メンバープロフィール表示用のCSS --- */

                display: flex; /* Flexboxを適用して子要素を横並びに */
                flex-wrap: wrap; /* 画面幅が足りない場合は折り返す */
                justify-content: center; /* 横方向の中央揃え */
                gap: 30px; /* 各プロフィール間の隙間 */
                margin: 50px auto; /* 上下の余白と中央寄せ */
                max-width: 960px; /* 必要に応じて最大幅を設定 */
            }
    
            .member-profile {
                display: flex;
                flex-direction: column; /* 所属、アイコン、名前を縦に並べる */
                align-items: center; /* 要素の中央揃え */
                width: 120px; /* 各プロフィールブロックの幅（アイコン+余白を考慮） */
                text-align: center;
            }
    
            /* プロフィール一覧の画像スタイル (円形トリミング中止) */
            .member-profile .faceicon img { /* member-profile内のfaceicon imgに限定 */

                margin-bottom: 5px;
            }

</style>


</p>
