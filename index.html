<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>座談会 → 吹き出しHTML 自動生成ツール</title>
    <style>
        body { font-family: sans-serif; margin: 40px; line-height: 1.6; }
        textarea { width: 100%; height: 150px; margin-bottom: 20px; font-size: 14px; padding: 10px; box-sizing: border-box; }
        button { padding: 10px 20px; font-size: 14px; cursor: pointer; margin-right: 10px; margin-bottom: 20px; }
        pre { background: #f5f5f5; padding: 20px; border: 1px solid #ddd; white-space: pre-wrap; word-break: break-all; }
        #preview { border: 1px solid #ddd; padding: 20px; margin-top: 10px; background: #fafafa; }
        
        /* 生成されるHTML用のスタイル（プレビュー用） */
        .member-list { display: flex; flex-wrap: wrap; gap: 15px; margin-bottom: 20px; }
        .member-profile { text-align: center; width: 80px; }
        .member-profile img { width: 60px; height: 60px; border-radius: 50%; object-fit: cover; border: 1px solid #eee; }
        .member-profile .team { font-size: 10px; color: #888; }
        .member-profile .name { font-size: 12px; font-weight: bold; }
        
        .balloon_l, .balloon_r { margin: 20px 0; display: flex; align-items: flex-start; }
        .balloon_r { flex-direction: row-reverse; }
        .faceicon { display: flex; flex-direction: column; align-items: center; margin: 0 15px; min-width: 80px; }
        .faceicon img { width: 60px; height: 60px; border-radius: 50%; object-fit: cover; }
        .faceicon .name { font-size: 11px; color: #666; text-align: center; margin-top: 5px; }
        .says { max-width: 70%; background: #e8f5e9; padding: 12px 15px; border-radius: 15px; position: relative; }
        .balloon_r .says { background: #eceff1; }
        .says p { margin: 0; }
    </style>
</head>
<body>

    <h2>① 参加メンバー（1行に1人ずつ名前を入力）</h2>
    <textarea id="members" placeholder="例：&#10;佐藤勝利&#10;菊池風磨"></textarea>

    <h2>② 座談会テキスト</h2>
    <p>形式： <strong>名前：発言内容</strong></p>
    <textarea id="input" placeholder="例：&#10;佐藤：こんにちは！&#10;菊池：よろしくおねがいします。&#10;STAFF：本日はよろしくお願いします。"></textarea>

    <button onclick="convert()">HTML生成</button>
    <button onclick="copyHTML()">HTMLコピー</button>

    <h3>プレビュー</h3>
    <div id="preview"></div>

    <h3>生成HTMLコード</h3>
    <pre id="output"></pre>

    <script>
      let MEMBER_DB = {};
      const STAFF_IMG = "https://ebidan.com/s3/skiyaki/uploads/ckeditor/pictures/761972/content_ne.png";
  
      async function loadMembers() {
          try {
              const res = await fetch("./members.json");
              if (res.ok) MEMBER_DB = await res.json();
          } catch (e) {
              console.error("DB読み込みエラー。サーバー経由で開くか、Edge/Chromeの制限を確認してください。");
          }
      }
      loadMembers();
  
      function normalize(str) {
          if (!str) return "";
          return str.replace(/\s/g, "").toLowerCase()
                    .replace(/[ァ-ン]/g, s => String.fromCharCode(s.charCodeAt(0) - 0x60));
      }
  
      // 名前を探す関数をより強力に
      function findMember(name) {
          const clean = normalize(name);
          if (clean === "staff" || clean === "スタッフ") return { name: "STAFF", img: STAFF_IMG, team: "STAFF" };
          if (clean === "一同" || clean === "全員") return { name: "一同", img: STAFF_IMG, team: "ALL" };
  
          for (const key in MEMBER_DB) {
              const dbKey = normalize(key);
              // フルネーム一致、または「矢野原」が「矢野原圭吾」に含まれる場合にヒット
              if (dbKey === clean || dbKey.includes(clean) || clean.includes(dbKey)) {
                  return { ...MEMBER_DB[key], name: key }; // DB側の正式名称を返す
              }
          }
          return null;
      }
  
      function convert() {
          const errors = [];
          const membersInput = document.getElementById("members").value.split(/\r?\n/);
          const conversationInput = document.getElementById("input").value.split(/\r?\n/);
  
          let html = `<h3>今回の参加メンバー</h3>\n<div class="member-list">`;
          
          // ① メンバーリスト生成（名字だけでもDBから正式名称を拾う）
          membersInput.forEach(line => {
              const inputName = line.trim();
              if (!inputName) return;
              const data = findMember(inputName);
              if (!data) {
                  errors.push("【未登録】" + inputName);
                  return;
              }
              html += `\n  <div class="member-profile">\n    <img src="${data.img}">\n    <div class="team">${data.team}</div>\n    <div class="name">${data.name}</div>\n  </div>`;
          });
  
          html += `\n</div>\n<hr>\n<section class="conversation-log">`;
  
          // ② 座談会本文
          conversationInput.forEach(line => {
              if (!line.trim()) return;
              const parts = line.split(/[:：]/);
              if (parts.length < 2) return;
  
              const inputName = parts[0].trim();
              const speech = parts.slice(1).join("：").trim();
              const data = findMember(inputName);
  
              if (!data) {
                  errors.push("【発言者不明】" + inputName);
                  return;
              }
  
              const isStaff = normalize(inputName) === "staff" || normalize(inputName) === "スタッフ";
              const side = isStaff ? "r" : "l";
  
              html += `\n<div class="balloon_${side}">\n  <div class="faceicon">\n    <img src="${data.img}">\n    <span class="name">${inputName}</span>\n  </div>\n  <div class="says"><p>${speech}</p></div>\n</div>`;
          });
  
          html += `\n</section>`;
  
          if (errors.length > 0) alert("以下の名前が見つかりません：\n" + errors.join("\n"));
  
          document.getElementById("output").textContent = html;
          document.getElementById("preview").innerHTML = html;
      }
      // copyHTML関数はそのまま
  </script>
</body>
</html>
