<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>Post List</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      padding: 20px;
      background: #f7f7f7;
    }
    .post {
      background: #fff;
      padding: 15px;
      margin-bottom: 10px;
      border-radius: 8px;
      box-shadow: 0 2px 5px rgba(0,0,0,0.1);
    }
    .date {
      font-size: 12px;
      color: #888;
    }
    .title {
      font-size: 16px;
      font-weight: bold;
      margin: 5px 0;
    }
    .link a {
      color: #007bff;
      text-decoration: none;
    }
  </style>
</head>
<body>

<h2>Posts</h2>
<div id="output"></div>

<script>
  // 元HTMLをそのまま貼る（ぐんちゃんのやつ）
  const rawHTML = `
    ${document.querySelector('.list-group')?.outerHTML || ''}
  `;

  // DOM化
  const parser = new DOMParser();
  const doc = parser.parseFromString(rawHTML, "text/html");

  const posts = doc.querySelectorAll('.post-list-group-item');
  const output = document.getElementById('output');

  posts.forEach(post => {
    const date = post.querySelector('.date-time')?.textContent.trim();
    const title = post.querySelector('.post-title')?.textContent.trim();
    const link = post.querySelector('.post-link a')?.href;

    if (!date || !title || !link) return;

    const el = document.createElement('div');
    el.className = 'post';
    el.innerHTML = `
      <div class="date">${date}</div>
      <div class="title">${title}</div>
      <div class="link"><a href="${link}" target="_blank">${link}</a></div>
    `;

    output.appendChild(el);
  });
</script>

</body>
</html>
