<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Post List - Simple View</title>
    <style>
        body {
            font-family: "Helvetica Neue", Arial, "Hiragino Kaku Gothic ProN", "Hiragino Sans", sans-serif;
            background-color: #f4f7f6;
            padding: 20px;
            color: #333;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
        }
        .post-card {
            background: #fff;
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 15px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            border-left: 5px solid #007bff;
        }
        .date-time {
            font-size: 0.85rem;
            color: #666;
            margin-bottom: 5px;
        }
        .post-title {
            font-size: 1.2rem;
            font-weight: bold;
            margin-bottom: 8px;
            line-height: 1.4;
        }
        .post-link a {
            color: #007bff;
            text-decoration: none;
            font-size: 0.9rem;
            word-break: break-all;
        }
        .post-link a:hover {
            text-decoration: underline;
        }
        /* 元データは非表示にする */
        #raw-data {
            display: none;
        }
    </style>
</head>
<body>

<div class="container" id="display-area">
    </div>

<div id="raw-data">
    <div class="list-group">
        </div>
</div>

<script>
    document.addEventListener("DOMContentLoaded", function() {
        const rawData = document.getElementById('raw-data');
        const displayArea = document.getElementById('display-area');
        const items = rawData.querySelectorAll('.list-group-item');

        items.forEach(item => {
            // データの抽出
            const dateTime = item.querySelector('.date-time').textContent.trim();
            const title = item.querySelector('.post-title').textContent.trim();
            const linkTag = item.querySelector('.post-link a');
            const linkHref = linkTag ? linkTag.getAttribute('href') : '#';

            // 新しいHTML要素の作成
            const card = document.createElement('div');
            card.className = 'post-card';

            card.innerHTML = `
                <div class="date-time">📅 ${dateTime}</div>
                <div class="post-title">${title}</div>
                <div class="post-link"><a href="${linkHref}" target="_blank">${linkHref}</a></div>
            `;

            displayArea.appendChild(card);
        });
    });
</script>

</body>
</html>
